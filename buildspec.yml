version: 0.2
phases:
  pre_build:
    commands:
      - echo "Logging into Amazon ECR..."
      # Authenticates Docker container runtime to talk to your private AWS registries
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  build:
    commands:
      - echo "Building Backend App-Tier Container Image..."
      - docker build -t app-tier-repo:latest ./application-code/app-tier
      - docker tag app-tier-repo:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/app-tier-repo:latest
      
      - echo "Building Frontend Web-Tier Container Image..."
      - docker build -t web-tier-repo:latest ./application-code/web-tier
      - docker tag web-tier-repo:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/web-tier-repo:latest
  post_build:
    commands:
      - echo "Pushing authenticated container layers to ECR..."
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/app-tier-repo:latest
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/web-tier-repo:latest
      
      - echo "Triggering deployment script directly on the EC2 server..."
      # This command securely runs your local upgrade script on the destination instance
      - aws ssm send-command --document-name "AWS-RunShellScript" --instance-ids "$EC2_INSTANCE_ID" --parameters 'commands=["cd /home/ubuntu/app && ./deploy.sh"]' --region $AWS_DEFAULT_REGION